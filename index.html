---
title: home 
---

<main>
    <h2 class="home-title"> 
        latest posts
        {% include random_phrase.html %}
    </h2>

    <ul>
        {% for post in site.posts %}
            <li>
                <p>
                    <a href="{{post.url}}">{{post.title}}</a>
                    <br>
                    {{post.date | date_to_string}}
                </p>
            </li>
        {% endfor %}
   
    </ul>
</main>
